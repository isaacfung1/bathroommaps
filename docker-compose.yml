services:
  db:
    image: postgis/postgis:15-3.4
    container_name: bathroommaps-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: peepee
      POSTGRES_PASSWORD: poopoo
      POSTGRES_DB: bathroommaps
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U peepee -d bathroommaps"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: bathroommaps-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./backend/.env

volumes:
  pgdata:
